<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Menu Admin - Main App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database-compat.js"></script>
    <style>
        body { background-color: #fffaf5; font-family: 'Pyidaungsu', sans-serif; }
        .orange-pattern { background-image: radial-gradient(#ffedd5 1px, transparent 1px); background-size: 20px 20px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<div class="text-right">
    <p class="text-xs text-gray-500">ယနေ့ရောင်းရငွေ</p>
    <h2 id="daily-total-display" class="text-xl font-bold text-orange-600">0 Ks</h2>
</div>
</head>
<body class="orange-pattern">

    <nav class="bg-white border-b-4 border-orange-500 p-4 shadow-sm sticky top-0 z-10">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-orange-600">Smart Menu Admin</h1>
            <div class="text-sm text-gray-500">Daily Total: <span id="daily-income" class="font-bold text-orange-600">0</span> Ks</div>
        </div>
        <div class="mt-8 bg-white p-6 rounded-xl shadow-lg border-t-4 border-orange-500">
    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <span class="relative flex h-3 w-3">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-3 w-3 bg-orange-500"></span>
        </span>
        ယနေ့အော်ဒါများ (New Orders)
    </h2>
    <div id="order-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        </div>
</div>
    </nav>

    <div class="container mx-auto p-4 md:p-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-white p-6 rounded-xl shadow-lg border border-orange-100 h-fit">
                <h2 class="text-xl font-bold mb-4 text-gray-700" id="form-title">ပစ္စည်းအသစ်ထည့်ရန်</h2>
                <input type="hidden" id="product-id">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600">ဓာတ်ပုံ URL</label>
                        <input type="text" id="p-img" class="w-full border-orange-200 border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="https://...">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600">အမည်</label>
                        <input type="text" id="p-name" class="w-full border-orange-200 border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600">ဈေးနှုန်း</label>
                        <input type="number" id="p-price" class="w-full border-orange-200 border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600">Category</label>
                        <select id="p-cat" class="w-full border-orange-200 border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-orange-500">
                            <option value="Food">အစားအစာ</option>
                            <option value="Drink">သောက်စရာ</option>
                            <option value="Snack">အဆာပြေ</option>
                        </select>
                    </div>
                    <button onclick="saveProduct()" id="btn-save" class="w-full bg-orange-500 text-white font-bold py-3 rounded-lg hover:bg-orange-600 transition shadow-md">
                        သိမ်းဆည်းမည်
                    </button>
                    <button onclick="resetForm()" id="btn-cancel" class="w-full bg-gray-200 text-gray-600 py-2 rounded-lg hidden">Cancel Edit</button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-4 rounded-xl shadow-sm mb-4 flex gap-2">
                    <input type="text" id="search-bar" onkeyup="searchProduct()" class="w-full border-orange-100 border rounded-full px-4 py-2" placeholder="Search menu...">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="product-list">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // --- Firebase Config ---
const firebaseConfig = {
    apiKey: "IzaSyC6aJ6JwNrjEKbnmcPKkqpjm0c6ok6cHas",
    authDomain: "rangoon-kitchen.firebaseapp.com",
    databaseURL: "https://rangoon-kitchen-default-rtdb.firebaseio.com",
    projectId: "rangoon-kitchen",
    storageBucket: "rangoon-kitchen.appspot.com",
    messagingSenderId: "939905185755",
    appId: "1:939905185755:web:f462d65e5fdf65d2d359fe"
};


// --- Initialize Firebase ---
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

        // --- Functions ---
        
        // ပစ္စည်း သိမ်းဆည်းခြင်း (Add or Update)
        function saveProduct() {
            const id = document.getElementById('product-id').value || Date.now();
            const data = {
                id: id,
                img: document.getElementById('p-img').value,
                name: document.getElementById('p-name').value,
                price: document.getElementById('p-price').value,
                cat: document.getElementById('p-cat').value
            };

            db.ref('products/' + id).set(data).then(() => {
                alert("Saved successfully!");
                resetForm();
            });
        }

        // Database ကနေ Data တွေ ဆွဲထုတ်ပြီး ပြသခြင်း
        db.ref('products').on('value', (snapshot) => {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            snapshot.forEach((child) => {
                const p = child.val();
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow flex gap-4 border-l-4 border-orange-400">
                        <img src="${p.img}" class="w-20 h-20 object-cover rounded-lg shadow-sm">
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-800">${p.name}</h3>
                            <p class="text-orange-500 font-bold">${p.price} Ks</p>
                            <p class="text-xs text-gray-400 italic">${p.cat}</p>
                            <div class="mt-2 flex gap-2">
                                <button onclick="editProduct('${p.id}')" class="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded">Edit</button>
                                <button onclick="deleteProduct('${p.id}')" class="text-xs bg-red-50 text-red-600 px-2 py-1 rounded">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });

        function editProduct(id) {
            db.ref('products/' + id).once('value', (s) => {
                const p = s.val();
                document.getElementById('product-id').value = p.id;
                document.getElementById('p-img').value = p.img;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-cat').value = p.cat;
                document.getElementById('form-title').innerText = "ပြင်ဆင်ရန်";
                document.getElementById('btn-save').innerText = "Update လုပ်မည်";
                document.getElementById('btn-cancel').classList.remove('hidden');
            });
        }

        function deleteProduct(id) {
            if(confirm("ဖျက်မှာ သေချာပါသလား?")) {
                db.ref('products/' + id).remove();
            }
        }

        function resetForm() {
            document.getElementById('product-id').value = '';
            document.getElementById('p-img').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('form-title').innerText = "ပစ္စည်းအသစ်ထည့်ရန်";
            document.getElementById('btn-save').innerText = "သိမ်းဆည်းမည်";
            document.getElementById('btn-cancel').classList.add('hidden');
        }
const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3');

// အသံကို သေချာပေါက်ထွက်အောင် လုပ်တဲ့ function
function playAlert() {
    audio.currentTime = 0; // အသံကို အစကနေ ပြန်စစေဖို့
    audio.play().catch(e => console.log("Audio play blocked: ", e));
}

// Order နားထောင်တဲ့နေရာမှာ အောက်ကအတိုင်း ပြင်ပါ
db.ref('orders').on('value', (snapshot) => {
    // ... ကျန်တဲ့ code တွေ ...
    snapshot.forEach((child) => {
        const order = child.val();
        if(order.status === 'pending') {
            playAlert(); // ဒီမှာ function ကို ခေါ်လိုက်ပါ
        }
    });
});

    db.ref('orders').on('value', (snapshot) => {
    const list = document.getElementById('order-list');
    list.innerHTML = ''; // အရင်စာရင်းဟောင်းတွေကို ရှင်းပစ်မယ်
    
    snapshot.forEach((child) => {
        const order = child.val();
        const orderId = child.key; // အော်ဒါရဲ့ ID (ဖျက်ဖို့၊ ပရင့်ထုတ်ဖို့ သုံးမယ်)

        if(order.status !== 'completed') {
            list.innerHTML += `
                <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-orange-500 mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-lg text-gray-800">Table: ${order.table_id}</span>
                        <span class="text-orange-600 font-bold">${order.total}</span>
                    </div>
                    
                    <div class="text-sm text-gray-600 border-t border-b border-gray-100 py-2 my-2">
                        ${Object.values(order.items).map(item => `
                            <div class="flex justify-between">
                                <span>${item.name} x ${item.qty}</span>
                                <span>${item.price * item.qty} Ks</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="flex gap-2">
                        <button onclick="printReceipt('${orderId}')" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-bold text-sm transition active:scale-95">
                             📄 Receipt
                        </button>

                        <button onclick="completeOrder('${orderId}')" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg font-bold text-sm transition active:scale-95">
                             ✅ Done
                        </button>
                    </div>
                </div>
            `;
        }
    });
});

function completeOrder(id) {
    db.ref('orders/' + id).update({ status: 'completed' });
}
function completeOrder(id) {
    if(confirm("ဒီအော်ဒါကို ပွဲသိမ်း (Done) လုပ်မှာ သေချာလား?")) {
        db.ref('orders/' + id).update({
            status: 'completed'
        }).then(() => {
            console.log("Order updated!");
        }).catch((error) => {
            alert("Error: " + error.message);
        });
    }
}
function showQR(id, name) {
    document.getElementById('qr-modal').classList.remove('hidden');
    document.getElementById('qr-title').innerText = name + " အတွက် QR Code";
    document.getElementById('qrcode').innerHTML = '';
    
    // URL ထဲမှာ စားပွဲနာမည် (name) ကိုပါ ထည့်ပေးလိုက်ပါမယ်
    const tableUrl = `https://github.com/zinminbobo23-star/rangoonkitchen/table.html?id=${id}&name=${encodeURIComponent(name)}`; 
    
    new QRCode(document.getElementById("qrcode"), {
        text: tableUrl,
        width: 200,
        height: 200
    });
}
// အော်ဒါစာရင်း ပြောင်းလဲတိုင်း ပိုက်ဆံကို အသစ်ပြန်တွက်မယ်
db.ref('orders').on('value', (snapshot) => {
    let totalIncome = 0;

    snapshot.forEach((child) => {
        const order = child.val();
        
        // အော်ဒါက "Done" (completed) ဖြစ်နေမှ ပိုက်ဆံပေါင်းမယ်
        if (order.status === 'completed') {
            // "500 Ks" ဆိုတဲ့ စာသားထဲကနေ နံပါတ် 500 ကိုပဲ ဆွဲထုတ်တာပါ
            let amount = parseInt(order.total.replace(/[^0-9]/g, ''));
            totalIncome += amount;
        }
    });

    // တွက်လို့ရတဲ့ စုစုပေါင်းကို Screen ပေါ်မှာ ပြလိုက်မယ်
    document.getElementById('daily-total-display').innerText = totalIncome + " Ks";
});
function printReceipt(orderId) {
    db.ref('orders/' + orderId).once('value', (snapshot) => {
        const order = snapshot.val();
        if(!order) return;

        let itemsHtml = `
            <p><b>Table Number:</b> ${order.table_name || order.table_id}</p>
            <p><b>အချိန်:</b> ${order.time}</p>
            <hr style="border-top: 1px dashed #000;">
            <table style="width: 100%;">
        `;

        Object.values(order.items).forEach(item => {
            itemsHtml += `
                <tr>
                    <td>${item.name} x ${item.qty}</td>
                    <td style="text-align: right;">${item.price * item.qty} Ks</td>
                </tr>
            `;
        });

        itemsHtml += `
            </table>
            <hr style="border-top: 1px dashed #000;">
            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;">
                <span>စုစုပေါင်း:</span>
                <span>${order.total}</span>
            </div>
        `;

        document.getElementById('receipt-details').innerHTML = itemsHtml;
        window.print(); // Browser ရဲ့ Print window ကို ခေါ်လိုက်တာပါ
    });
}
    </script>
    <div id="receipt-print-area" class="hidden">
    <div style="width: 80mm; padding: 10px; font-family: sans-serif; font-size: 12px; line-height: 1.5;">
        <div style="text-align: center;">
            <h2 style="margin: 0;">Rangoon Kitchen</h2>
            <p style="margin: 5px 0;">ကျေးဇူးတင်ပါသည်</p>
            <hr style="border-top: 1px dashed #000;">
        </div>
        <div id="receipt-details">
            </div>
        <hr style="border-top: 1px dashed #000;">
        <div style="text-align: center; margin-top: 10px;">
            <p>Rangoon Kitchen</p>
        </div>
    </div>
</div>

<style>
    /* Print ထုတ်တဲ့အခါမှပဲ ဒါကိုပြမယ် */
    @media print {
        body * { visibility: hidden; }
        #receipt-print-area, #receipt-print-area * { visibility: visible; }
        #receipt-print-area { position: absolute; left: 0; top: 0; width: 80mm; }
    }
</style>
</body>
</html>
