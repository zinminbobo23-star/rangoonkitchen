<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rangoon Kitchen - Customer Order</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans overflow-hidden">

    <header class="h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
            <h1 class="text-sm font-black uppercase tracking-wider text-emerald-400">Rangoon Kitchen</h1>
        </div>
        <span id="table-display-badge" class="bg-emerald-500/10 text-emerald-400 text-[11px] font-bold px-2.5 py-1 rounded-full border border-emerald-500/20">📍 TELEGRAM DELIVERY</span>
    </header>

    <main class="flex-grow overflow-y-auto p-4 space-y-5 custom-scroll pb-28">
        
        <section class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3 shadow-sm">
            <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider"><i class="fa-solid fa-user-check"></i> ပို့ဆောင်မည့် အချက်အလက်</h2>
            
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">ဝယ်သူအမည် (Customer Name)</label>
                <input type="text" id="cust-name" placeholder="မင်းရဲ့အမည် ဖြည့်ပါ..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm outline-none focus:border-emerald-500 text-slate-200">
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">ဖုန်းနံပါတ် (Phone Number)</label>
                <input type="tel" id="cust-phone" placeholder="09xxxxxxxxx" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm outline-none focus:border-emerald-500 text-slate-200 font-mono">
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">လက်ရှိ တည်နေရာ (GPS Location)</label>
                <button onclick="getUserCurrentGPSLocation()" id="btn-location" class="w-full bg-sky-500/10 hover:bg-sky-500/20 text-sky-400 border border-sky-500/20 font-bold py-2.5 px-4 rounded-xl text-xs flex items-center justify-center gap-2 transition">
                    <i class="fa-solid fa-location-crosshairs"></i> 📍 တည်နေရာပေးပို့ရန် (Get Location)
                </button>
                <input type="hidden" id="cust-geo-coords" value="">
                <p id="location-status-text" class="text-[10px] text-slate-500 font-mono mt-1 text-center hidden"></p>
            </div>
        </section>

        <section class="space-y-3">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Our Delicious Menu</h2>
            
            <div id="customer-menu-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div class="text-center py-12 text-slate-500 text-xs font-mono col-span-full">မီနူးများအား ဆွဲယူနေပါသည်...</div>
            </div>
        </section>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 p-4 flex items-center justify-between z-50">
        <div class="font-mono">
            <div class="text-[10px] text-slate-400 uppercase">Total Items Selected</div>
            <div id="cart-total-counter" class="text-sm font-black text-emerald-400">0 Items - 0 Baht</div>
        </div>
        <button onclick="submitFinalOrderToFirebase()" id="btn-submit-order" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black px-6 py-3 rounded-xl text-xs tracking-wider shadow-lg flex items-center gap-2 transition">
            <i class="fa-solid fa-paper-plane"></i> SEND ORDER
        </button>
    </footer>

    <script>
        let db = null;
        let shoppingCart = {}; 
        let currentTableId = "DELIVERY"; 
        let customerChatId = "";
        let globalGeoLink = "No Map Link"; // Google Map Link သိမ်းရန်

        // ⚠️ Dashboard နှင့် တူညီသော FIREBASE CONFIG ဒေတာများ ထည့်သွင်းပါ ⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyC6aJ6JwNrjEKbnmcPKkqpjm0c6ok6cHas",
  authDomain: "rangoon-kitchen.firebaseapp.com",
  databaseURL: "https://rangoon-kitchen-default-rtdb.firebaseio.com",
  projectId: "rangoon-kitchen",
  storageBucket: "rangoon-kitchen.firebasestorage.app",
  messagingSenderId: "939905185755",
  appId: "1:939905185755:web:f462d65e5fdf65d2d359fe"
        };

        window.onload = function() {
            // Telegram Web App ခေါ်ယူမှု စစ်ဆေးခြင်း
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    const tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();

                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        customerChatId = tg.initDataUnsafe.user.id ? tg.initDataUnsafe.user.id.toString() : "";
                    }

                    const urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.has('table')) {
                        currentTableId = urlParams.get('table').toUpperCase();
                    }
                }
            } catch (e) { console.error(e); }

            document.getElementById('table-display-badge').innerText = currentTableId === "DELIVERY" ? "📍 TELEGRAM DELIVERY" : `🍽️ TABLE: ${currentTableId}`;

            // Firebase ချိတ်ဆက်ခြင်း
            if (firebaseConfig.databaseURL && !firebaseConfig.databaseURL.includes("YOUR_")) {
                try {
                    if (!firebase.apps.length) {
                        firebase.initializeApp(firebaseConfig);
                        db = firebase.database();
                        loadProductsFromDatabase();
                    }
                } catch (err) { console.error(err); }
            }
        };

        // 📍 ဝယ်သူ့ဖုန်းထဲက GPS Location ကို တိုက်ရိုက် ဖမ်းယူပေးသည့် စနစ်
        function getUserCurrentGPSLocation() {
            const statusText = document.getElementById('location-status-text');
            const locBtn = document.getElementById('btn-location');
            
            statusText.classList.remove('hidden');
            statusText.innerText = "📍 တည်နေရာ ရှာဖွေနေပါသည်...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        // Google Maps လင့်ခ်အဖြစ် တန်းပြောင်းလဲခြင်း
                        globalGeoLink = `https://www.google.com/maps?q=${lat},${lng}`;
                        
                        document.getElementById('cust-geo-coords').value = `${lat},${lng}`;
                        statusText.innerText = "✅ တည်နေရာ ဖမ်းယူမှု အောင်မြင်ပါပြီ။";
                        statusText.className = "text-[10px] text-emerald-400 font-mono mt-1 text-center";
                        locBtn.className = "w-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 font-bold py-2.5 px-4 rounded-xl text-xs flex items-center justify-center gap-2";
                    },
                    (error) => {
                        statusText.innerText = "❌ တည်နေရာ ဖတ်မရပါ။ ဖုန်းထဲတွင် Location (GPS) ဖွင့်ပေးပါ။";
                        statusText.className = "text-[10px] text-rose-400 font-mono mt-1 text-center";
                    },
                    { enableHighAccuracy: true, timeout: 8000 }
                );
            } else {
                statusText.innerText = "❌ မင်းရဲ့ Browser/ဖုန်း က Location စနစ်ကို ထောက်ပံ့မှုမပေးပါ။";
            }
        }

        // 🍽️ မုန့်စာရင်း ဆွဲထုတ်ပြသခြင်း
        function loadProductsFromDatabase() {
            if (!db) return;
            db.ref('products').on('value', (snapshot) => {
                const container = document.getElementById('customer-menu-container');
                container.innerHTML = '';

                if (!snapshot.exists()) {
                    container.innerHTML = `<div class="text-center py-12 text-slate-500 text-xs font-mono col-span-full">မီနူးများ မရှိသေးပါဗျာ။</div>`;
                    return;
                }

                snapshot.forEach(child => {
                    const p = child.val();
                    const pKey = child.key;
                    const pImg = p.image || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200";

                    container.innerHTML += `
                        <div class="bg-slate-900 border border-slate-800/80 p-3 rounded-2xl flex gap-3 items-center shadow-sm">
                            <img src="${pImg}" class="w-16 h-16 object-cover rounded-xl border border-slate-800 bg-slate-950 shrink-0">
                            <div class="flex-grow">
                                <div class="text-xs font-black text-slate-200">${p.name}</div>
                                <div class="text-[10px] text-slate-500 font-mono mt-0.5">${p.sub_category}</div>
                                <div class="text-xs font-black text-emerald-400 font-mono mt-1">${p.price} Baht</div>
                            </div>
                            <div class="flex items-center gap-2.5 bg-slate-950 px-2 py-1 rounded-xl border border-slate-800 shrink-0">
                                <button onclick="updateCartQty('${pKey}', '${p.name}', ${p.price}, '${pImg}', -1)" class="w-6 h-6 text-slate-400 hover:text-rose-500 text-xs transition"><i class="fa-solid fa-minus"></i></button>
                                <span id="qty-badge-${pKey}" class="text-xs font-black font-mono w-4 text-center">0</span>
                                <button onclick="updateCartQty('${pKey}', '${p.name}', ${p.price}, '${pImg}', 1)" class="w-6 h-6 text-emerald-400 hover:text-emerald-300 text-xs transition"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>`;
                });
            });
        }

        function updateCartQty(pKey, name, price, image, change) {
            if (!shoppingCart[pKey]) {
                shoppingCart[pKey] = { name: name, price: price, qty: 0, image: image };
            }
            shoppingCart[pKey].qty += change;
            if (shoppingCart[pKey].qty <= 0) {
                delete shoppingCart[pKey];
                document.getElementById(`qty-badge-${pKey}`).innerText = "0";
            } else {
                document.getElementById(`qty-badge-${pKey}`).innerText = shoppingCart[pKey].qty;
            }
            refreshCartCounterUI();
        }

        function refreshCartCounterUI() {
            let totalQty = 0; let totalPrice = 0;
            Object.values(shoppingCart).forEach(item => {
                totalQty += item.qty; totalPrice += (item.price * item.qty);
            });
            document.getElementById('cart-total-counter').innerText = `${totalQty} Items - ${totalPrice.toLocaleString()} Baht`;
        }

        // 🚀 အော်ဒါပေးပို့ခြင်း Function
        function submitFinalOrderToFirebase() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();

            // ⚠️ Validation အချက်အလက်များ အရင်စစ်ဆေးခြင်း
            if (!name || !phone) {
                return alert("ပို့ဆောင်ပေးရမည့် ဝယ်သူအမည် နှင့် ဖုန်းနံပါတ်ကို ဖြည့်ပေးပါဦးဗျာ။");
            }
            if (Object.keys(shoppingCart).length === 0) {
                return alert("ခြင်းတောင်းထဲမှာ မှာယူမယ့် ဟင်းပွဲ မရှိသေးပါဘူးဗျာ။");
            }
            if (!db) return alert("စနစ်ချိတ်ဆက်မှု မရှိသေးပါ။");

            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Dashboard ဘက်မှာ အလွယ်တကူ Map ခလုတ်နှိပ်လို့ရအောင် စာသားသတ်မှတ်ခြင်း
            const userLabelCombined = `အမည်: ${name} | ဖုန်း: ${phone} | မြေပုံလင့်ခ်: ${globalGeoLink}`;

            const finalOrderPayload = {
                table_id: currentTableId,
                customer_chat_id: customerChatId,
                user_label: userLabelCombined, // 👈 Cashier Dashboard မှာ စာသားနဲ့ Map Button အလိုအလျောက် ပေါ်လာစေမည့် နေရာ
                status: "pending",
                time: timeString,
                items: shoppingCart
            };

            db.ref('orders').push().set(finalOrderPayload)
                .then(() => {
                    alert("🎉 အော်ဒါကို ဆိုင်သို့ အောင်မြင်စွာ ပေးပို့ပြီးပါပြီဗျာ။");
                    shoppingCart = {};
                    refreshCartCounterUI();
                    document.querySelectorAll('[id^="qty-badge-"]').forEach(el => el.innerText = "0");
                    document.getElementById('cust-name').value = '';
                    document.getElementById('cust-phone').value = '';
                    
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.close();
                    }
                })
                .catch(err => { alert("Error: " + err.message); });
        }
    </script>
</body>
</html>
