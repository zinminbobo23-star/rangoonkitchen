<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rangoon Kitchen - Customer Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 👈 CSS ကုဒ်တွေကို ဒီလို Style တဂ်အောက်မှာပဲ သေသေချာချာ ထည့်ရပါတယ် */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #020617; 
            color: #f1f5f9;
            overflow-y: scroll !important; /* ဝဘ်ဆိုက်တစ်ခုလုံးကို အမြဲတမ်း Scroll ဆွဲလို့ရအောင် ပိတ်ဖွင့်လိုက်တာပါ */
        }
        .scrollable-body { 
            min-height: calc(100vh - 140px); 
            padding: 20px; 
            padding-bottom: 140px; 
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">

    <header class="h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-4 shrink-0">
        <h1 class="text-sm font-black text-emerald-400 uppercase">Rangoon Kitchen</h1>
        <span id="shop-status-badge" class="text-[11px] font-bold px-2.5 py-1 rounded-full bg-emerald-500/10 text-emerald-400">📍 DELIVERY</span>
    </header>

    <div class="scrollable-body">
        
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 mb-6">
            <h3 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-3">📋 ပို့ဆောင်မည့် အချက်အလက်</h3>
            <div class="space-y-3">
                <input type="text" id="cusName" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500" placeholder="ဝယ်သူအမည် ဖြည့်ပါ...">
                <input type="text" id="cusPhone" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500" placeholder="ဖုန်းနံပါတ် 09xxxxxxxxx">
                <button id="locationBtn" class="w-full py-2.5 bg-slate-950 border border-slate-800 hover:border-sky-500/50 text-sky-400 text-xs font-medium rounded-lg transition duration-200">📍 တည်နေရာပေးပို့ရန် (Get Location)</button>
                <input type="hidden" id="cusLocation" value="မရွေးချယ်ရသေးပါ">
            </div>
        </div>

        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">OUR MENU (DELIVERY PRICES)</h3>
        
        <div id="menu-list-container" class="space-y-4">
            <p class="text-sm text-slate-500 animate-pulse">Loading Menu from Firebase...</p>
        </div>

    </div>

    <footer class="fixed bottom-0 left-0 right-0 h-20 bg-slate-900/90 backdrop-blur border-t border-slate-800 flex items-center justify-between px-4 z-50">
        <div>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">TOTAL ITEMS SELECTED</p>
            <p id="totalDisplay" class="text-emerald-400 font-black text-lg">0 Items - 0 Baht</p>
        </div>
        <button id="sendOrderBtn" class="px-6 py-3 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-sm rounded-xl transition duration-200 shadow-lg shadow-emerald-500/20 uppercase tracking-wider">Send Order</button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // ⚠️ သင့်ရဲ့ Firebase Config ကို ဒီမှာ အမှန်အတိုင်း ပြန်ထည့်ပေးပါ
        const firebaseConfig = {
            apiKey: "AIzaSyC6aJ6JwNrjEKbnmcPKkqpjm0c6ok6cHas",
  authDomain: "rangoon-kitchen.firebaseapp.com",
  databaseURL: "https://rangoon-kitchen-default-rtdb.firebaseio.com",
  projectId: "rangoon-kitchen",
  storageBucket: "rangoon-kitchen.firebasestorage.app",
  messagingSenderId: "939905185755",
  appId: "1:939905185755:web:f462d65e5fdf65d2d359fe"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const menuRef = ref(database, '/');
        
        onValue(menuRef, (snapshot) => {
            let data = snapshot.val();
            const container = document.getElementById('menu-list-container');
            container.innerHTML = "";

            if(!data) {
                container.innerHTML = "<p class='text-sm text-rose-400'>No menu items found in Firebase Database.</p>";
                return;
            }

            if (data.menus) { data = data.menus; }
            if (data.orders) { delete data.orders; }

            Object.keys(data).forEach(key => {
                const item = data[key];
                if (!item || typeof item !== 'object') return;

                const itemName = item.name || item.title;
                const itemPrice = parseInt(item.price || item.cost || 0);
                const itemImage = item.image || item.img || 'https://via.placeholder.com/80';

                if(!itemName) return;

                let optionsHtml = "";
                if (itemName.includes("မုန့်ဟင်းခါး")) {
                    optionsHtml = `
                        <div class="mt-3 pt-3 border-t border-slate-800/60 grid grid-cols-2 gap-2">
                            <label class="flex items-center text-xs text-slate-400 gap-2"><input type="checkbox" class="addon rounded bg-slate-950 border-slate-800 text-emerald-500 focus:ring-0" data-name="ပဲကြော်" data-price="10"> ပဲကြော် (+10B)</label>
                            <label class="flex items-center text-xs text-slate-400 gap-2"><input type="checkbox" class="addon rounded bg-slate-950 border-slate-800 text-emerald-500 focus:ring-0" data-name="ငါးဖယ်" data-price="10"> ငါးဖယ် (+10B)</label>
                        </div>`;
                } else if (itemName.includes("လက်ဖက်ရည်")) {
                    optionsHtml = `
                        <div class="mt-3 pt-3 border-t border-slate-800/60 grid grid-cols-2 gap-2">
                            <label class="flex items-center text-xs text-slate-400 gap-2"><input type="radio" name="opt-${key}" class="addon bg-slate-950 border-slate-800 text-emerald-500 focus:ring-0" data-name="ချိုဆိမ့်" data-price="0"> ချိုဆိမ့်</label>
                            <label class="flex items-center text-xs text-slate-400 gap-2"><input type="radio" name="opt-${key}" class="addon bg-slate-950 border-slate-800 text-emerald-500 focus:ring-0" data-name="ကျဆိမ့်" data-price="0"> ကျဆိမ့်</label>
                            <label class="flex items-center text-xs text-slate-400 gap-2"><input type="radio" name="opt-${key}" class="addon bg-slate-950 border-slate-800 text-emerald-500 focus:ring-0" data-name="ပေါ့ဆိမ့်" data-price="0"> ပေါ့ဆိမ့်</label>
                            <label class="flex items-center text-xs text-slate-400 gap-2"><input type="radio" name="opt-${key}" class="addon bg-slate-950 border-slate-800 text-emerald-500 focus:ring-0" data-name="ပုံမှန်" data-price="0" checked> ပုံမှန်</label>
                        </div>`;
                }

                const itemHtml = `
                    <div class="menu-item bg-slate-900 border border-slate-800 rounded-xl p-4 transition hover:border-slate-700" data-id="${key}" data-name="${itemName}" data-price="${itemPrice}">
                        <div class="flex items-center justify-between gap-3">
                            <div class="flex items-center gap-3">
                                <img src="${itemImage}" class="w-12 h-12 rounded-lg object-cover bg-slate-950 border border-slate-800 shadow" alt="${itemName}">
                                <div>
                                    <h4 class="text-sm font-bold text-slate-100">${itemName}</h4>
                                    <p class="text-xs font-semibold text-sky-400 mt-0.5">${itemPrice} Baht</p>
                                </div>
                            </div>
                            <div class="flex items-center bg-slate-950 border border-slate-800 rounded-lg p-1 gap-3 shadow-inner">
                                <button class="btn-qty minus-btn w-7 h-7 flex items-center justify-center bg-slate-900 hover:bg-slate-800 rounded-md font-bold text-sm text-slate-400 transition">-</button>
                                <span class="qty-val text-xs font-bold min-w-[12px] text-center">0</span>
                                <button class="btn-qty plus-btn w-7 h-7 flex items-center justify-center bg-slate-900 hover:bg-slate-800 rounded-md font-bold text-sm text-slate-400 transition">+</button>
                            </div>
                        </div>
                        ${optionsHtml}
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHtml);
            });

            bindMenuEvents();
        });

        function bindMenuEvents() {
            document.querySelectorAll('.menu-item').forEach(item => {
                const plusBtn = item.querySelector('.plus-btn');
                const minusBtn = item.querySelector('.minus-btn');
                const qtyVal = item.querySelector('.qty-val');

                plusBtn.onclick = () => {
                    let qty = parseInt(qtyVal.innerText);
                    qty++; qtyVal.innerText = qty;
                    updateTotal();
                };

                minusBtn.onclick = () => {
                    let qty = parseInt(qtyVal.innerText);
                    if (qty > 0) { qty--; qtyVal.innerText = qty; updateTotal(); }
                };

                item.querySelectorAll('.addon').forEach(addon => {
                    addon.onchange = () => { updateTotal(); };
                });
            });
        }

        function updateTotal() {
            let totalPrice = 0; 
            let totalItems = 0;
            document.querySelectorAll('.menu-item').forEach(item => {
                const qty = parseInt(item.querySelector('.qty-val').innerText);
                const basePrice = parseInt(item.getAttribute('data-price'));
                
                if(qty > 0) {
                    totalItems += qty;
                    let itemTotal = basePrice;
                    item.querySelectorAll('.addon:checked').forEach(addon => {
                        itemTotal += parseInt(addon.getAttribute('data-price') || 0);
                    });
                    totalPrice += (itemTotal * qty);
                }
            });
            document.getElementById('totalDisplay').innerText = `${totalItems} Items - ${totalPrice} Baht`;
        }

        document.getElementById('locationBtn').onclick = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    document.getElementById('cusLocation').value = `https://www.google.com/maps?q=${lat},${lon}`;
                    document.getElementById('locationBtn').innerText = "✅ တည်နေရာ ရရှိပါပြီ";
                    document.getElementById('locationBtn').className = "w-full py-2.5 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-xs font-bold rounded-lg text-center";
                });
            }
        };

        document.getElementById('sendOrderBtn').onclick = function() {
            const name = document.getElementById('cusName').value.trim();
            const phone = document.getElementById('cusPhone').value.trim();
            const location = document.getElementById('cusLocation').value;

            let totalDisplayTxt = document.getElementById('totalDisplay').innerText;
            let currentTotalItems = parseInt(totalDisplayTxt.split(" ")[0]);
            let currentTotalPrice = parseInt(totalDisplayTxt.split("-")[1].trim().split(" ")[0]);

            if (!name || !phone) { alert("အမည်နှင့် ဖုန်းနံပါတ် ဖြည့်ပေးပါဦး။"); return; }
            if (currentTotalItems === 0) { alert("မီနူး ရွေးချယ်ပေးပါဦး။"); return; }

            let itemsOrdered = [];
            document.querySelectorAll('.menu-item').forEach(item => {
                const qty = parseInt(item.querySelector('.qty-val').innerText);
                if(qty > 0) {
                    let selectedOptions = [];
                    item.querySelectorAll('.addon:checked').forEach(addon => {
                        selectedOptions.push(addon.getAttribute('data-name'));
                    });
                    itemsOrdered.push({
                        item_name: item.getAttribute('data-name'),
                        quantity: qty,
                        options: selectedOptions
                    });
                }
            });

            const orderData = {
                customer_name: name, customer_phone: phone, location: location,
                items: itemsOrdered, total_price: currentTotalPrice, status: "pending",
                timestamp: new Date().toISOString()
            };

            const ordersRef = ref(database, 'orders');
            push(ordersRef).then(() => {
                alert("အော်ဒါ တင်ပြီးပါပြီ ခင်ဗျာ။");
                document.getElementById('cusName').value = "";
                document.getElementById('cusPhone').value = "";
                document.querySelectorAll('.qty-val').forEach(v => v.innerText = "0");
                updateTotal();
            });
        };
    </script>
</body>
</html>
