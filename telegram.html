<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rangoon Kitchen</title>
    <style>
        /* --- GLOBAL STYLE & OVERFLOW CONTROL --- */
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            background-color: #060b13; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #ffffff;
            overflow: hidden; /* Intro ပြီးမှ Scroll ပေးဖွင့်ရန် */
        }

        /* --- ၁။ INTRO ANIMATION STYLE --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #060b13; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: fadeOutBg 1s ease-in-out 3s forwards;
        }
        .intro-logo {
            width: 100px; height: 100px;
            background-color: #10b981; /* ឡိုဂိုပုံမရှိသေး၍ အစိမ်းရောင်ဝိုင်းပြထားခြင်း */
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 24px; color: white;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.6);
            transform: scale(0);
            animation: zoomInLogo 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s forwards;
        }
        .intro-text {
            margin-top: 20px; font-size: 20pt; font-weight: bold; color: #10b981;
            opacity: 0; letter-spacing: 2px;
            animation: fadeInUpText 0.8s ease-out 1.2s forwards;
        }
        @keyframes zoomInLogo { to { transform: scale(1); } }
        @keyframes fadeInUpText { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOutBg { to { opacity: 0; visibility: hidden; } }

        /* --- ၂။ LAYOUT & ၆။ PAGE SCROLL STYLE --- */
        .main-app { opacity: 0; animation: showApp 0.5s ease-out 3.5s forwards; }
        @keyframes showApp { to { opacity: 1; } }

        .header { padding: 15px 20px; background-color: #09111e; border-bottom: 1px solid #142238; position: sticky; top: 0; z-index: 100; }
        .header-title { color: #10b981; font-size: 16pt; font-weight: bold; display: inline-block; }
        .delivery-badge { float: right; background-color: #ef4444; color: white; padding: 4px 8px; border-radius: 4px; font-size: 9pt; font-weight: bold; }
        .clear-fix { clear: both; }
        
        /* Main Body Scroll ရမည့် အပိုင်း */
        .scrollable-body { 
            height: calc(100vh - 140px); /* Header နှင့် Footer နုတ်ပြီး ကျန်တာ Scroll ပေးခြင်း */
            overflow-y: auto; padding: 20px; 
            padding-bottom: 100px;
        }
        .scrollable-body::-webkit-scrollbar { width: 6px; }
        .scrollable-body::-webkit-scrollbar-track { background: #060b13; }
        .scrollable-body::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }

        .form-section { background-color: #09111e; border: 1px solid #142238; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .form-title { color: #10b981; margin-top: 0; margin-bottom: 10px; font-size: 11pt; }
        .input-group { margin-bottom: 12px; }
        .input-group input { width: 100%; padding: 10px; background-color: #03070c; border: 1px solid #142238; color: white; border-radius: 4px; }
        .location-btn { width: 100%; padding: 10px; background-color: #111c2e; border: 1px solid #1d3354; color: #38bdf8; text-align: center; border-radius: 4px; cursor: pointer; font-size: 10pt; }
        
        .section-title { font-size: 11pt; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; }
        
        /* Menu Items */
        .menu-item { background-color: #09111e; border: 1px solid #142238; border-radius: 8px; padding: 15px; margin-bottom: 12px; }
        .menu-main { display: table; width: 100%; }
        .menu-img-box { display: table-cell; width: 60px; vertical-align: top; }
        .menu-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background-color: #111c2e; }
        .menu-details { display: table-cell; vertical-align: middle; padding-left: 10px; }
        .item-name { font-size: 11pt; font-weight: bold; margin: 0 0 4px 0; }
        .item-price { color: #38bdf8; font-size: 10pt; margin: 0; }
        .quantity-control { display: table-cell; text-align: right; vertical-align: middle; width: 100px; }
        .btn-qty { background-color: #111c2e; border: 1px solid #142238; color: white; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .qty-val { margin: 0 8px; font-size: 10pt; }

        /* --- ၅။ CANCEL / UPDATE ORDER STYLE --- */
        .order-status-box { background-color: #1e1b4b; border: 1px solid #4338ca; border-radius: 8px; padding: 15px; margin-bottom: 20px; display: none; }
        .status-header { color: #f43f5e; font-weight: bold; margin-bottom: 8px; }
        .btn-cancel { background-color: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 9pt; }

        /* Footer Sticky Bar */
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background-color: #09111e; border-top: 1px solid #142238; padding: 15px 20px; z-index: 100; }
        .total-box { float: left; }
        .total-label { font-size: 8pt; color: #64748b; text-transform: uppercase; }
        .total-amount { color: #10b981; font-weight: bold; font-size: 12pt; margin-top: 2px; }
        .send-btn { float: right; background-color: #10b981; color: #ffffff; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 10pt; }
        .send-btn:disabled { background-color: #4b5563; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="intro-logo">RANGOON</div> 
        <div class="intro-text">RANGOON KITCHEN</div>
    </div>

    <div class="main-app">
        
        <div class="header">
            <div class="header-title">RANGOON KITCHEN</div>
            <div class="delivery-badge">DELIVERY</div>
            <div class="clear-fix"></div>
        </div>

        <div class="scrollable-body">

            <div class="order-status-box" id="statusBox">
                <div class="status-header">⚠️ သင်၏ အော်ဒါကို တင်ပြီးပါပြီ။ ပြန်ပြင်ချင်/ဖျက်ချင်ပါက Cancel နှိပ်ပါ။</div>
                <p style="font-size: 9pt; color:#cbd5e1; margin: 0 0 10px 0;">Order ID: <span id="currentOrderId"></span></p>
                <button class="btn-cancel" id="cancelOrderBtn">CANCEL ORDER</button>
            </div>
            
            <div class="form-section">
                <div class="form-title">ပို့ဆောင်မည့် အချက်အလက်</div>
                <div class="input-group">
                    <input type="text" id="cusName" placeholder="ဝယ်သူအမည် ဖြည့်ပါ...">
                </div>
                <div class="input-group">
                    <input type="text" id="cusPhone" placeholder="ဖုန်းနံပါတ် 09xxxxxxxxx">
                </div>
                <div class="location-btn" id="locationBtn">📍 တည်နေရာပေးပို့ရန် (Get Location)</div>
                <input type="hidden" id="cusLocation" value="မရွေးချယ်ရသေးပါ">
            </div>

            <div class="section-title">OUR MENU</div>
            
            <div id="menu-list-container">
                <p style="color: #64748b; font-size: 10pt;">Loading Menu from Firebase...</p>
            </div>

        </div>

        <div class="footer-bar">
            <div class="total-box">
                <div class="total-label">TOTAL ITEMS SELECTED</div>
                <div class="total-amount" id="totalDisplay">0 Items - 0 Baht</div>
            </div>
            <button class="send-btn" id="sendOrderBtn">SEND ORDER</button>
            <div class="clear-fix"></div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // ⚠️ သင့်ရဲ့ Firebase Config ကို ဒီမှာ အမှန်အတိုင်း ပြန်ထည့်ပေးပါ
        const firebaseConfig = {
            apiKey: "AIzaSyC6aJ6JwNrjEKbnmcPKkqpjm0c6ok6cHas",
  authDomain: "rangoon-kitchen.firebaseapp.com",
  databaseURL: "https://rangoon-kitchen-default-rtdb.firebaseio.com",
  projectId: "rangoon-kitchen",
  storageBucket: "rangoon-kitchen.firebasestorage.app",
  messagingSenderId: "939905185755",
  appId: "1:939905185755:web:f462d65e5fdf65d2d359fe"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Intro Animation ပြီးမှ Page Scroll ကို ပြန်ဖွင့်ပေးခြင်း
        setTimeout(() => {
            document.body.style.overflow = "auto";
        }, 3500);

        let activeOrderId = null; 

        // 🛠️ ပြင်ဆင်ချက်- လမ်းကြောင်းကို 'menus' မဟုတ်ဘဲ အပြင်ဘက်ဆုံး '/' ကနေ တိုက်ရိုက်ဖတ်ခိုင်းလိုက်ပါတယ်
        const menuRef = ref(database, '/'); 
        
        onValue(menuRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('menu-list-container');
            container.innerHTML = ""; 

            // အကယ်၍ 'orders' node ပါ ရောပြီးပါလာရင် ဖယ်ထုတ်ပစ်ရန်
            if(data && data.orders) {
                delete data.orders; 
            }

            if(!data || Object.keys(data).length === 0) {
                container.innerHTML = "<p>No menu items found in Firebase Database.</p>";
                return;
            }

            // Loop ပတ်ပြီး UI ဆောက်ခြင်း
            Object.keys(data).forEach(key => {
                const item = data[key];
                
                // ဒေတာထဲမှာ နာမည် သို့မဟုတ် ဈေးနှုန်းမပါရင် ကျော်သွားရန် (orders node တွေ မှားမဝင်စေရန်)
                if(!item.name && !item.title) return; 

                // Database ထဲမှာ စာလုံးပေါင်းက name ဖြစ်ဖြစ် title ဖြစ်ဖြစ်၊ price ဖြစ်ဖြစ် cost ဖြစ်ဖြစ် ဖတ်ပေးမည့်စနစ်
                const itemName = item.name || item.title || "Unknown Item";
                const itemPrice = item.price || item.cost || 0;
                const itemImage = item.image || item.img || 'https://via.placeholder.com/50';

                const itemHtml = `
                    <div class="menu-item" data-id="${key}" data-name="${itemName}" data-price="${itemPrice}">
                        <div class="menu-main">
                            <div class="menu-img-box">
                                <img src="${itemImage}" class="menu-img" alt="${itemName}">
                            </div>
                            <div class="menu-details">
                                <h4 class="item-name">${itemName}</h4>
                                <p class="item-price">${itemPrice} Baht</p>
                            </div>
                            <div class="quantity-control">
                                <button class="btn-qty minus-btn">-</button>
                                <span class="qty-val">0</span>
                                <button class="btn-qty plus-btn">+</button>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHtml);
            });

            // ခလုတ်များ အလုပ်လုပ်အောင် Logic ပြန်ချိတ်ပေးခြင်း
            bindMenuEvents();
        });

        // Plus / Minus ခလုတ်များဆိုင်ရာ Event Listener
        function bindMenuEvents() {
            document.querySelectorAll('.menu-item').forEach(item => {
                const plusBtn = item.querySelector('.plus-btn');
                const minusBtn = item.querySelector('.minus-btn');
                const qtyVal = item.querySelector('.qty-val');

                plusBtn.onclick = () => {
                    let qty = parseInt(qtyVal.innerText);
                    qty++; qtyVal.innerText = qty;
                    updateTotal();
                };

                minusBtn.onclick = () => {
                    let qty = parseInt(qtyVal.innerText);
                    if (qty > 0) { qty--; qtyVal.innerText = qty; updateTotal(); }
                };
            });
        }

        // စုစုပေါင်း ကျသင့်ငွေ တွက်ချက်ခြင်း
        let totalPrice = 0;
        let totalItems = 0;

        function updateTotal() {
            totalPrice = 0; totalItems = 0;
            document.querySelectorAll('.menu-item').forEach(item => {
                const qty = parseInt(item.querySelector('.qty-val').innerText);
                const price = parseInt(item.getAttribute('data-price'));
                if(qty > 0) {
                    totalItems += qty;
                    totalPrice += (price * qty);
                }
            });
            document.getElementById('totalDisplay').innerText = `${totalItems} Items - ${totalPrice} Baht`;
        }

        // Location စနစ်
        document.getElementById('locationBtn').onclick = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    document.getElementById('cusLocation').value = `http://maps.google.com/?q=${lat},${lon}`;
                    document.getElementById('locationBtn').innerText = "✅ တည်နေရာ ရရှိပါပြီ";
                    document.getElementById('locationBtn').style.color = "#10b981";
                });
            }
        };

        // --- ORDER တင်ခြင်း (SAVE TO FIREBASE) ---
        document.getElementById('sendOrderBtn').onclick = function() {
            const name = document.getElementById('cusName').value.trim();
            const phone = document.getElementById('cusPhone').value.trim();
            const location = document.getElementById('cusLocation').value;

            if (!name || !phone) { alert("အမည်နှင့် ဖုန်းနံပါတ် ဖြည့်ပေးပါဦး။"); return; }
            if (totalItems === 0) { alert("မီနူး ရွေးချယ်ပေးပါဦး။"); return; }

            let itemsOrdered = [];
            document.querySelectorAll('.menu-item').forEach(item => {
                const qty = parseInt(item.querySelector('.qty-val').innerText);
                if(qty > 0) {
                    itemsOrdered.push({
                        item_name: item.getAttribute('data-name'),
                        quantity: qty
                    });
                }
            });

            const orderData = {
                customer_name: name, customer_phone: phone, location: location,
                items: itemsOrdered, total_price: totalPrice, status: "pending",
                timestamp: new Date().toISOString()
            };

            // အော်ဒါများကို orders ဆိုသည့် သီးသန့် node အောက်တွင်သွားသိမ်းမည်
            const ordersRef = ref(database, 'orders');
            const newOrderRef = push(ordersRef);
            activeOrderId = newOrderRef.key; 

            set(newOrderRef, orderData).then(() => {
                alert("အော်ဒါ တင်ပြီးပါပြီ ခင်ဗျာ။");
                document.getElementById('currentOrderId').innerText = activeOrderId;
                document.getElementById('statusBox').style.display = "block";
                document.querySelectorAll('.qty-val').forEach(v => v.innerText = "0");
                updateTotal();
            });
        };

        // --- CANCEL ORDER FUNCTIONALITY ---
        document.getElementById('cancelOrderBtn').onclick = function() {
            if (activeOrderId && confirm("ဤအော်ဒါကို တကယ်ပဲ Cancel ချင်ပါသလား?")) {
                const specificOrderRef = ref(database, `orders/${activeOrderId}`);
                remove(specificOrderRef).then(() => {
                    alert("သင့်အော်ဒါကို ပယ်ဖျက် (Cancel) လိုက်ပါပြီ။");
                    document.getElementById('statusBox').style.display = "none";
                    activeOrderId = null;
                }).catch(err => {
                    alert("အော်ဒါဖျက်၍ မရတော့ပါ။ ဆိုင်သို့ တိုက်ရိုက် ဆက်သွယ်ပါ။");
                });
            }
        };
    </script>
</body>
</html>
