<!DOCTYPE html>
<html lang="en" id="app-root" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rangoon Kitchen - Telegram Order</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col overflow-hidden transition-colors duration-200">

    <div id="info-input-screen" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center p-6 text-center z-50">
        <div class="w-16 h-16 bg-emerald-500/10 text-emerald-400 rounded-full flex items-center justify-center text-2xl mb-2">
            <i class="fa-solid fa-truck-ramp-box"></i>
        </div>
        <h2 class="text-xl font-black text-white uppercase tracking-wide">Rangoon Kitchen Delivery</h2>
        <p class="text-xs text-slate-400 mt-1 mb-6">ပို့ဆောင်ပေးရမည့် အချက်အလက်များကို ဖြည့်စွက်ပေးပါဗျာ။</p>
        
        <div class="space-y-3 max-w-xs w-full text-left">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">သင့်အမည် (Name)</label>
                <input type="text" id="cust-name" placeholder="မောင်မောင်" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm text-white focus:border-emerald-500 outline-none">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">ဖုန်းနံပါတ် (Phone Number)</label>
                <input type="tel" id="cust-phone" placeholder="09xxxxxxxxx" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm text-white focus:border-emerald-500 outline-none">
            </div>
            
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">မြေပုံတည်နေရာ (Map Location)</label>
                <button onclick="getCurrentGPSLocation()" type="button" id="btn-gps" class="w-full bg-slate-900 hover:bg-slate-800 border border-slate-800 rounded-xl p-3 text-xs text-emerald-400 font-bold flex items-center justify-center gap-2 transition">
                    <i class="fa-solid fa-location-crosshairs text-base"></i> <span id="gps-status-text">လက်ရှိတည်နေရာကို GPS ဖြင့်ရယူမည်</span>
                </button>
                <input type="hidden" id="cust-geo-coords" value="">
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">အိမ်လိပ်စာ အပြည့်အစုံ (Address)</label>
                <textarea id="cust-address" rows="2" placeholder="အိမ်နံပါတ်၊ လမ်းနာမည်၊ အမှတ်အသား..." class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm text-white focus:border-emerald-500 outline-none"></textarea>
            </div>
            
            <button onclick="startOrderingSession()" class="w-full bg-emerald-500 text-slate-950 font-black py-3.5 rounded-xl text-xs tracking-wider transition shadow-lg shadow-emerald-500/10 mt-2">
                MENU ကြည့်ရှုရန် ဝင်မည်
            </button>
        </div>
    </div>

    <header class="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 relative z-40">
        <div class="flex items-center gap-2">
            <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></div>
            <span class="text-xs font-bold uppercase text-slate-400">Delivery Mode</span>
        </div>
        <div class="absolute left-1/2 transform -translate-x-1/2 text-center">
            <h1 class="text-base font-black text-emerald-600 dark:text-emerald-400 tracking-wider">Rangoon Kitchen</h1>
            <p id="info-header-display" class="text-[9px] font-mono text-slate-400 truncate max-w-[150px]">Loading customer...</p>
        </div>
        <button onclick="toggleCartModal()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-emerald-500/10 text-emerald-500 relative">
            <i class="fa-solid fa-basket-shopping"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
        </button>
    </header>

    <div class="flex-grow overflow-y-auto p-4 pb-24">
        <div id="menu-items-container" class="space-y-6"></div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-end justify-center hidden">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-t-3xl p-5 border-t border-slate-200 dark:border-slate-800 flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-sm uppercase text-slate-400">Review Delivery Basket</h3>
                <button onclick="toggleCartModal()" class="text-slate-400 text-lg"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="cart-items-list" class="flex-grow overflow-y-auto space-y-2 font-mono text-xs"></div>
            <div class="border-t border-slate-100 dark:border-slate-800 pt-3 mt-3 flex justify-between items-center">
                <span class="text-xs font-bold text-slate-400">Total Bill</span>
                <span id="cart-total-amount" class="text-base font-black text-emerald-500">0 Ks</span>
            </div>
            <button onclick="submitDeliveryOrderToFirebase()" class="w-full bg-emerald-500 text-slate-950 font-black py-4 rounded-xl text-xs mt-4 tracking-wider shadow-lg">
                အော်ဒါအတည်ပြုပြီး ပို့ဆောင်မည်
            </button>
        </div>
    </div>

    <script>
        let customerLabelInfo = "";
        let cart = {};
        let geoCoordsString = "No GPS Data";

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        const firebaseConfig = { apiKey: "AIzaSyC6aJ6JwNrjEKbnmcPKkqpjm0c6ok6cHas",
  authDomain: "rangoon-kitchen.firebaseapp.com",
  databaseURL: "https://rangoon-kitchen-default-rtdb.firebaseio.com",
  projectId: "rangoon-kitchen",
  storageBucket: "rangoon-kitchen.firebasestorage.app",
  messagingSenderId: "939905185755",
  appId: "1:939905185755:web:f462d65e5fdf65d2d359fe" };
        let db;
        try { if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); db = firebase.database(); initMenuLoader(); } } catch(e) { }

        // 🛠️ ဖုန်းရဲ့ GPS တည်နေရာကို ဆွဲယူသည့် Function
        function getCurrentGPSLocation() {
            const statusText = document.getElementById('gps-status-text');
            const btnGps = document.getElementById('btn-gps');
            
            if (!navigator.geolocation) {
                alert("သင့်ဖုန်း သို့မဟုတ် Browser က GPS စနစ်ကို အထောက်အပံ့မပြုပါဗျာ။");
                return;
            }

            statusText.innerText = "တည်နေရာ ရှာဖွေနေဆဲ...";
            btnGps.classList.add('animate-pulse');

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    geoCoordsString = `${lat},${lon}`;
                    
                    document.getElementById('cust-geo-coords').value = geoCoordsString;
                    statusText.innerText = "📍 တည်နေရာ ရရှိပြီးပါပြီ။";
                    btnGps.classList.remove('animate-pulse');
                    btnGps.className = "w-full bg-emerald-500/10 border border-emerald-500 rounded-xl p-3 text-xs text-emerald-400 font-bold flex items-center justify-center gap-2 transition";
                },
                (error) => {
                    btnGps.classList.remove('animate-pulse');
                    statusText.innerText = "တည်နေရာရယူရန် ပျက်ကွက်ခဲ့သည်။";
                    alert("ကျေးဇူးပြု၍ သင့်ဖုန်းရဲ့ GPS (Location) ကို ဖွင့်ပေးပြီးမှ တစ်ခါပြန်နှိပ်ပေးပါဗျာ။");
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function startOrderingSession() {
            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const addr = document.getElementById('cust-address').value.trim();
            const coords = document.getElementById('cust-geo-coords').value;

            if(!name || !phone || !addr) return alert("ကျေးဇူးပြု၍ အမည်၊ ဖုန်းနှင့် လိပ်စာကို ဖြည့်ပေးပါဗျာ။");
            
            // Database ထဲကို သိမ်းမယ့် ပုံစံကို GPS link ပါ တစ်ခါတည်းတွဲထည့်လိုက်မယ်
            let mapsUrl = coords ? `https://www.google.com/maps?q=${coords}` : "No Map Link";
            customerLabelInfo = `အမည်: ${name} (ဖုန်း: ${phone}) | လိပ်စာ: ${addr} | မြေပုံလင့်ခ်: ${mapsUrl}`;
            
            document.getElementById('info-header-display').innerText = `${name} [${phone}]`;
            document.getElementById('info-input-screen').classList.add('hidden');
        }

        function toggleCartModal() { document.getElementById('cart-modal').classList.toggle('hidden'); updateCartUI(); }

        function addToCart(productId, name, price) {
            if(!cart[productId]) cart[productId] = { name: name, price: price, qty: 0 };
            cart[productId].qty++;
            updateCartBadge();
        }

        function changeCartQty(productId, change) {
            if(!cart[productId]) return;
            cart[productId].qty += change;
            if(cart[productId].qty <= 0) delete cart[productId];
            updateCartUI(); updateCartBadge();
        }

        function updateCartBadge() {
            let totalQty = Object.values(cart).reduce((sum, item) => sum + item.qty, 0);
            const badge = document.getElementById('cart-badge');
            if(totalQty > 0) { badge.innerText = totalQty; badge.classList.remove('hidden'); }
            else { badge.classList.add('hidden'); }
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items-list'); list.innerHTML = '';
            let total = 0;
            Object.keys(cart).forEach(id => {
                let cost = cart[id].price * cart[id].qty; total += cost;
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 dark:bg-slate-800/50 p-2 rounded-xl">
                        <div><div>${cart[id].name}</div><div class="text-[10px] text-slate-400">${cart[id].price.toLocaleString()} Ks</div></div>
                        <div class="flex items-center gap-2">
                            <button onclick="changeCartQty('${id}', -1)" class="w-6 h-6 bg-slate-200 dark:bg-slate-700 rounded-lg font-bold">-</button>
                            <span class="text-sm font-bold text-emerald-500">${cart[id].qty}</span>
                            <button onclick="changeCartQty('${id}', 1)" class="w-6 h-6 bg-slate-200 dark:bg-slate-700 rounded-lg font-bold">+</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('cart-total-amount').innerText = `${total.toLocaleString()} Ks`;
        }

        function initMenuLoader() {
            if(!db) return;
            db.ref('products').on('value', (snapshot) => {
                const container = document.getElementById('menu-items-container'); container.innerHTML = '';
                let structured = {};
                if(!snapshot.exists()) { container.innerHTML = `<div class="text-center py-10 text-slate-400 text-xs">No food menu available.</div>`; return; }

                snapshot.forEach(child => {
                    const p = child.val(); p.key = child.key;
                    if(!structured[p.sub_category]) structured[p.sub_category] = [];
                    structured[p.sub_category].push(p);
                });

                Object.keys(structured).forEach(subCat => {
                    let sectionHtml = `<div><h3 class="text-xs font-bold text-emerald-500 uppercase tracking-wider mb-2">─ ${subCat}</h3><div class="grid grid-cols-1 gap-2">`;
                    structured[subCat].forEach(p => {
                        sectionHtml += `
                            <div class="p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl flex justify-between items-center shadow-sm">
                                <div><h4 class="text-sm font-bold">${p.name}</h4><p class="font-mono text-xs text-emerald-500 font-bold mt-0.5">${p.price.toLocaleString()} Ks</p></div>
                                <button onclick="addToCart('${p.key}', '${p.name}', ${p.price})" class="bg-emerald-500 text-slate-950 font-bold px-3 py-1.5 rounded-xl text-xs">Add +</button>
                            </div>
                        `;
                    });
                    container.innerHTML += sectionHtml + `</div></div>`;
                });
            });
        }

        function submitDeliveryOrderToFirebase() {
            if(Object.keys(cart).length === 0) return alert("ခြင်းတောင်းထဲမှာ အစားအသောက်မရှိပါ!");
            if(db) {
                const timeString = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const orderData = {
                    table_id: "DELIVERY",
                    user_label: customerLabelInfo, // ဤနေရာတွင် အမည်၊ လိပ်စာနှင့် Google Maps Link ပါသွားမည်ဖြစ်သည်
                    time: timeString,
                    status: "pending",
                    items: cart
                };
                db.ref('orders').push().set(orderData).then(() => {
                    cart = {}; updateCartBadge(); toggleCartModal();
                    alert("လူကြီးမင်းအော်ဒါကို အောင်မြင်စွာ လက်ခံရရှိပါပြီဗျာ။");
                    if(window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.close();
                    }
                });
            }
        }
    </script>
</body>
</html>
